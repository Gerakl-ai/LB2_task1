<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Задание 1</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #e5e5e5;
            font-family: Arial, sans-serif;
        }

        ol {
            width: 600px;
            margin: 40px auto;
            background: #e59aa7;
            padding: 20px;
        }

        li {
            list-style-position: inside;
            background: #c46874;
            margin: 10px 0;
            padding: 10px;
            color: white;
            font-size: 20px;
        }

        .active {
            background: #793d46;
        }

        span {
            background: #9e394c;
            padding: 8px 20px;
        }
    </style>
</head>

<body>

    <ol>

        <li><span>Apple</span></li>

        <li class="active"><span>Orange</span></li>

        <li><span>Pineapple</span></li>

        <li><span>Pear</span></li>

        <li><span>Cherry</span></li>

    </ol>

</body>
</html>
